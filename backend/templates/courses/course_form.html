{% extends 'base.html' %}
{% block title %}Créer un cours{% endblock %}

{% block content %}
<h2 class="mb-4">➕ Créer un cours</h2>

<div class="card shadow-sm" style="max-width: 600px;">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-semibold">Titre du cours</label>
        <input type="text" name="title" class="form-control" placeholder="Ex : Introduction au RGPD" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Groupe cible</label>
        <select name="group" class="form-select" required>
          <option value="">— Choisir un groupe —</option>
          {% for group in groups %}
          <option value="{{ group.pk }}">{{ group.name }} ({{ group.get_type_display }})</option>
          {% endfor %}
        </select>
      </div>
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label fw-semibold">Nombre de slides</label>
          <input type="number" name="nb_slides" class="form-control" value="5" min="1" max="20">
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label fw-semibold">Nombre de questions</label>
          <input type="number" name="nb_questions" class="form-control" value="5" min="1" max="20">
        </div>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Créer</button>
        <a href="{% url 'courses:admin_dashboard' %}" class="btn btn-outline-secondary">Annuler</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
