{% extends "base.html" %}
{% block title %}Modifier les slides — {{ course.title }}{% endblock %}
{% block content %}

<style>
/* Bouton Slides (actif = page courante) */
.btn-nav-slides        { background:#0d6efd; color:#fff; border-color:#0d6efd; }
.btn-nav-slides:hover  { background:#0a58ca; color:#fff; border-color:#0a58ca; }
.btn-nav-slides.active { background:#6ea8fe; color:#000; border-color:#6ea8fe; }

/* Bouton Questions (inactif sur cette page) */
.btn-nav-questions        { background:#fff; color:#6c757d; border-color:#6c757d; }
.btn-nav-questions:hover  { background:#ffc107; color:#000; border-color:#ffc107; }

/* Sauvegarder */
.btn-save-custom             { background:#0d6efd; color:#fff; border-color:#0d6efd; }
.btn-save-custom:hover       { background:#0a58ca; color:#fff; border-color:#0a58ca; }
.btn-save-custom:disabled    { background:#adb5bd; color:#fff; border-color:#adb5bd; cursor:not-allowed; }

/* Aperçu */
.btn-apercu-custom       { background:#0d6efd; color:#fff; border-color:#0d6efd; }
.btn-apercu-custom:hover { background:#0a58ca; color:#fff; border-color:#0a58ca; }

/* Sortir */
.btn-sortir-custom       { background:#dc3545; color:#fff; border-color:#dc3545; }
.btn-sortir-custom:hover { background:#b02a37; color:#fff; border-color:#b02a37; }

/* Publier */
.btn-publier-custom       { background:#198754; color:#fff; border-color:#198754; }
.btn-publier-custom:hover { background:#146c43; color:#fff; border-color:#146c43; }
</style>

<!-- ── HEADER ── -->
<div class="mb-1">
  <!-- Ligne 1 : icône + titre -->
  <div class="d-flex align-items-center gap-2">
    <i class="bi bi-file-slides fs-3 text-primary"></i>
    <h1 class="h3 mb-0">Modifier les slides</h1>
  </div>
  <!-- Ligne 2 : nom du cours -->
  <div class="text-muted ms-1 mt-1">{{ course.title }}</div>
</div>

<hr class="my-3">

<form method="post" id="slides-form">
  {% csrf_token %}
  <input type="hidden" name="action" id="form-action" value="save">

  {% for slide in slides %}
  <div class="card mb-3">
    <div class="card-header d-flex align-items-center gap-2 py-2">
      <i class="bi bi-layers text-primary"></i>
      <strong>Slide {{ slide.order }}</strong>
    </div>
    <div class="card-body">
      <textarea
        name="slide_{{ slide.pk }}"
        rows="5"
        class="form-control font-monospace slide-input"
        data-original="{{ slide.content|escapejs }}"
      >{{ slide.content }}</textarea>
    </div>
  </div>
  {% endfor %}

  <!-- ── BOX NAVIGATION ── -->
  <div class="card mb-3">
    <div class="card-body p-2">
      <div class="d-flex align-items-center gap-0">
        <div style="width:48%"><span class="btn btn-nav-slides active w-100"><i class="bi bi-1-circle-fill me-1"></i>Slides</span></div>
        <div style="width:4%" class="text-center text-muted fw-bold">›</div>
        <div style="width:48%"><a href="{% url 'courses:review_questions' pk=course.pk %}" class="btn btn-nav-questions w-100"><i class="bi bi-2-circle me-1"></i>Questions</a></div>
      </div>
    </div>
  </div>

  <!-- ── BOX ACTIONS ── -->
  <div class="card mb-4">
    <div class="card-body p-2">
      <!-- LIGNE 1 : Sauvegarder | Aperçu -->
      <div class="row g-2 mb-2">
        <div class="col-6">
          <button type="submit" id="btn-save" class="btn btn-save-custom w-100" disabled
                  onclick="document.getElementById('form-action').value='save'">
            <i class="bi bi-floppy me-1"></i>Sauvegarder
          </button>
        </div>
        <div class="col-6">
          <a href="{% url 'participations:slide_reader' course.pk %}?preview=1"
             class="btn btn-apercu-custom w-100">
            <i class="bi bi-play-circle me-1"></i>Aperçu
          </a>
        </div>
      </div>
      <!-- LIGNE 2 : Sortir | Publier -->
      <div class="row g-2">
        <div class="col-6">
          <a href="{% url 'courses:responsible_group' pk=course.group.pk %}"
             class="btn btn-sortir-custom w-100">
            <i class="bi bi-x-circle me-1"></i>Sortir
          </a>
        </div>
        <div class="col-6">
          <button type="submit" class="btn btn-publier-custom w-100"
                  onclick="document.getElementById('form-action').value='publish'; return confirm('Sauvegarder et publier \u00ab {{ course.title }} \u00bb ? Il sera visible par les membres du groupe.')">
            <i class="bi bi-rocket-takeoff me-1"></i>Publier
          </button>
        </div>
      </div>
    </div>
  </div>
  </div>
</form>

<script>
(function () {
  const inputs = document.querySelectorAll('.slide-input');
  const btnSave = document.getElementById('btn-save');
  function checkChanges() {
    let changed = false;
    inputs.forEach(function (el) {
      if (el.value !== el.dataset.original) changed = true;
    });
    btnSave.disabled = !changed;
  }
  inputs.forEach(function (el) { el.addEventListener('input', checkChanges); });
})();
</script>
{% endblock %}
