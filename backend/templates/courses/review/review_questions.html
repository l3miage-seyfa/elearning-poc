{% extends "base.html" %}
{% block title %}Modifier les questions — {{ course.title }}{% endblock %}
{% block content %}

<style>
/* Bouton Slides (inactif sur cette page) */
.btn-nav-slides        { background:#fff; color:#6c757d; border-color:#6c757d; }
.btn-nav-slides:hover  { background:#0d6efd; color:#fff; border-color:#0d6efd; }

/* Bouton Questions (actif = page courante) */
.btn-nav-questions        { background:#ffc107; color:#000; border-color:#ffc107; }
.btn-nav-questions:hover  { background:#d39e00; color:#000; border-color:#d39e00; }
.btn-nav-questions.active { background:#ffe083; color:#000; border-color:#ffe083; }

/* Sauvegarder */
.btn-save-custom             { background:#ffc107; color:#000; border-color:#ffc107; }
.btn-save-custom:hover       { background:#d39e00; color:#000; border-color:#d39e00; }
.btn-save-custom:disabled    { background:#adb5bd; color:#fff; border-color:#adb5bd; cursor:not-allowed; }

/* Aperçu */
.btn-apercu-custom       { background:#0d6efd; color:#fff; border-color:#0d6efd; }
.btn-apercu-custom:hover { background:#0a58ca; color:#fff; border-color:#0a58ca; }

/* Sortir */
.btn-sortir-custom       { background:#dc3545; color:#fff; border-color:#dc3545; }
.btn-sortir-custom:hover { background:#b02a37; color:#fff; border-color:#b02a37; }

/* Publier */
.btn-publier-custom       { background:#198754; color:#fff; border-color:#198754; }
.btn-publier-custom:hover { background:#146c43; color:#fff; border-color:#146c43; }
</style>

<!-- ── HEADER ── -->
<div class="mb-1">
  <!-- Ligne 1 : icône + titre -->
  <div class="d-flex align-items-center gap-2">
    <i class="bi bi-patch-question fs-3 text-warning"></i>
    <h1 class="h3 mb-0">Modifier les questions</h1>
  </div>
  <!-- Ligne 2 : nom du cours -->
  <div class="text-muted ms-1 mt-1">{{ course.title }}</div>
</div>

<hr class="my-3">

<form method="post" id="questions-form">
  {% csrf_token %}
  <input type="hidden" name="action" id="form-action" value="save">

  {% for q in questions %}
  <div class="card mb-4">
    <div class="card-header d-flex align-items-center gap-2 py-2">
      <i class="bi bi-question-circle text-warning"></i>
      <strong>Question {{ q.order }}</strong>
    </div>
    <div class="card-body">
      <div class="mb-3">
        <label class="form-label fw-semibold">Énoncé</label>
        <textarea name="q_{{ q.pk }}_text" rows="2" class="form-control q-input"
                  data-original="{{ q.text|escapejs }}">{{ q.text }}</textarea>
      </div>
      <div class="row g-2 mb-3">
        <div class="col-md-6">
          <label class="form-label">A)</label>
          <input type="text" name="q_{{ q.pk }}_a" value="{{ q.choice_a }}" class="form-control q-input" data-original="{{ q.choice_a|escapejs }}">
        </div>
        <div class="col-md-6">
          <label class="form-label">B)</label>
          <input type="text" name="q_{{ q.pk }}_b" value="{{ q.choice_b }}" class="form-control q-input" data-original="{{ q.choice_b|escapejs }}">
        </div>
        <div class="col-md-6">
          <label class="form-label">C)</label>
          <input type="text" name="q_{{ q.pk }}_c" value="{{ q.choice_c }}" class="form-control q-input" data-original="{{ q.choice_c|escapejs }}">
        </div>
        <div class="col-md-6">
          <label class="form-label">D)</label>
          <input type="text" name="q_{{ q.pk }}_d" value="{{ q.choice_d }}" class="form-control q-input" data-original="{{ q.choice_d|escapejs }}">
        </div>
      </div>
      <div class="row g-2">
        <div class="col-md-4">
          <label class="form-label fw-semibold">Bonne réponse</label>
          <select name="q_{{ q.pk }}_correct" class="form-select q-input" data-original="{{ q.correct_answer }}">
            {% for letter in "abcd" %}
            <option value="{{ letter }}" {% if q.correct_answer == letter %}selected{% endif %}>{{ letter|upper }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-8">
          <label class="form-label fw-semibold">Explication</label>
          <textarea name="q_{{ q.pk }}_explanation" rows="2" class="form-control q-input"
                    data-original="{{ q.explanation|escapejs }}">{{ q.explanation }}</textarea>
        </div>
      </div>
    </div>
  </div>
  {% endfor %}

  <!-- ── BOX NAVIGATION ── -->
  <div class="card mb-3">
    <div class="card-body p-2">
      <div class="d-flex align-items-center gap-0">
        <div style="width:48%"><a href="{% url 'courses:review_slides' pk=course.pk %}" class="btn btn-nav-slides w-100"><i class="bi bi-1-circle me-1"></i>Slides</a></div>
        <div style="width:4%" class="text-center text-muted fw-bold">›</div>
        <div style="width:48%"><span class="btn btn-nav-questions active w-100"><i class="bi bi-2-circle-fill me-1"></i>Questions</span></div>
      </div>
    </div>
  </div>

  <!-- ── BOX ACTIONS ── -->
  <div class="card mb-4">
    <div class="card-body p-2">
      <!-- LIGNE 1 : Sauvegarder | Aperçu -->
      <div class="row g-2 mb-2">
        <div class="col-6">
          <button type="submit" id="btn-save" class="btn btn-save-custom w-100" disabled
                  onclick="document.getElementById('form-action').value='save'">
            <i class="bi bi-floppy me-1"></i>Sauvegarder
          </button>
        </div>
        <div class="col-6">
          <a href="{% url 'courses:preview_questions' pk=course.pk %}"
             class="btn btn-apercu-custom w-100"
             onclick="window.open(this.href,'_blank','noopener,noreferrer'); return false;">
            <i class="bi bi-eye me-1"></i>Aperçu
          </a>
        </div>
      </div>
      <!-- LIGNE 2 : Sortir | Publier -->
      <div class="row g-2">
        <div class="col-6">
          <a href="{% url 'courses:responsible_group' pk=course.group.pk %}"
             class="btn btn-sortir-custom w-100">
            <i class="bi bi-x-circle me-1"></i>Sortir
          </a>
        </div>
        <div class="col-6">
          <button type="submit" class="btn btn-publier-custom w-100"
                  onclick="document.getElementById('form-action').value='publish'; return confirm('Sauvegarder et publier \u00ab {{ course.title }} \u00bb ? Il sera visible par les membres du groupe.')">
            <i class="bi bi-rocket-takeoff me-1"></i>Publier
          </button>
        </div>
      </div>
    </div>
  </div>
</form>

<script>
(function () {
  const inputs = document.querySelectorAll('.q-input');
  const btnSave = document.getElementById('btn-save');
  function checkChanges() {
    let changed = false;
    inputs.forEach(function (el) {
      if (el.value !== el.dataset.original) changed = true;
    });
    btnSave.disabled = !changed;
  }
  inputs.forEach(function (el) { el.addEventListener('input', checkChanges); el.addEventListener('change', checkChanges); });
})();
</script>
{% endblock %}
