{% extends 'base.html' %}
{% block title %}Quiz — {{ course.title }}{% endblock %}

{% block content %}
<h2 class="mb-1">❓ Quiz</h2>
<p class="text-muted mb-4">{{ course.title }}</p>

<form method="post">
  {% csrf_token %}
  {% for q in questions %}
  <div class="card mb-3 shadow-sm">
    <div class="card-body">
      <p class="fw-semibold mb-3">{{ forloop.counter }}. {{ q.text }}</p>
      {% for letter, label in q.ANSWER_CHOICES %}
      <div class="form-check">
        <input class="form-check-input" type="radio" name="q{{ q.pk }}"
               id="q{{ q.pk }}_{{ letter }}" value="{{ letter }}" required>
        <label class="form-check-label" for="q{{ q.pk }}_{{ letter }}">
          <strong>{{ label|upper }}.</strong>
          {% if letter == 'a' %}{{ q.choice_a }}
          {% elif letter == 'b' %}{{ q.choice_b }}
          {% elif letter == 'c' %}{{ q.choice_c }}
          {% else %}{{ q.choice_d }}{% endif %}
        </label>
      </div>
      {% endfor %}
    </div>
  </div>
  {% endfor %}

  <button type="submit" class="btn btn-success btn-lg">Valider mes réponses →</button>
</form>
{% endblock %}
