{% extends 'base.html' %}
{% block title %}{{ action }} une personne{% endblock %}
{% block nav_persons %}active{% endblock %}

{% block content %}
<h2 class="mb-4"><i class="bi bi-person me-2"></i>{{ action }} une personne</h2>

<div class="card shadow-sm" style="max-width: 580px;">
  <div class="card-body p-4">
    <form method="post">
      {% csrf_token %}
      <div class="row mb-3">
        <div class="col">
          <label class="form-label fw-semibold">Prénom</label>
          <input type="text" name="first_name" class="form-control"
                 value="{{ values.first_name|default:'' }}" required>
        </div>
        <div class="col">
          <label class="form-label fw-semibold">Nom</label>
          <input type="text" name="last_name" class="form-control"
                 value="{{ values.last_name|default:'' }}" required>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Email</label>
        <input type="email" name="email" class="form-control"
               value="{{ values.email|default:'' }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">
          Mot de passe{% if action == 'Modifier' %} <span class="text-muted fw-normal">(laisser vide pour ne pas changer)</span>{% endif %}
        </label>
        <input type="password" name="password" class="form-control"
               {% if action == 'Créer' %}required{% endif %}
               placeholder="{% if action == 'Modifier' %}Nouveau mot de passe…{% else %}Mot de passe{% endif %}">
      </div>
      <div class="mb-4 form-check">
        <input type="checkbox" class="form-check-input" name="is_admin" id="is_admin"
               {% if values.is_admin %}checked{% endif %}>
        <label class="form-check-label" for="is_admin">Administrateur</label>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-check-lg me-1"></i>{{ action }}
        </button>
        <a href="{% url 'accounts:person_list' %}" class="btn btn-outline-secondary">
          <i class="bi bi-arrow-left me-1"></i>Annuler
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
