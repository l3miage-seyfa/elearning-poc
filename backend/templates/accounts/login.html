<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — SGC Formation</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #0d6efd; display: flex; align-items: center; min-height: 100vh; }
    .login-card { max-width: 420px; width: 100%; }
  </style>
</head>
<body>
<div class="container d-flex justify-content-center">
  <div class="login-card">
    <div class="card shadow-lg">
      <div class="card-body p-5">
        <h1 class="text-center mb-1 fw-bold">📚 SGC</h1>
        <p class="text-center text-muted mb-4">Système de Gestion des Connaissances</p>

        {% if messages %}
          {% for message in messages %}
            <div class="alert alert-danger">{{ message }}</div>
          {% endfor %}
        {% endif %}

        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold">Email</label>
            <input type="email" name="email" class="form-control form-control-lg"
                   placeholder="prenom.nom@entreprise.fr" required autofocus>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Mot de passe</label>
            <input type="password" name="password" class="form-control form-control-lg"
                   placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-primary btn-lg w-100">Se connecter</button>
        </form>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
