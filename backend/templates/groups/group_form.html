{% extends 'base.html' %}
{% block title %}{{ action }} un groupe{% endblock %}
{% block nav_groups_admin %}active{% endblock %}

{% block content %}
<h2 class="mb-4"><i class="bi bi-diagram-3 me-2"></i>{{ action }} un groupe</h2>

<div class="card shadow-sm" style="max-width: 680px;">
  <div class="card-body p-4">
    <form method="post">
      {% csrf_token %}

      <div class="mb-3">
        <label class="form-label fw-semibold">Nom du groupe</label>
        <input type="text" name="name" class="form-control"
               value="{{ values.name|default:'' }}" required>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Description</label>
        <textarea name="description" class="form-control" rows="2">{{ values.description|default:'' }}</textarea>
      </div>

      <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label fw-semibold">Type</label>
          <select name="type" class="form-select">
            <option value="direction"  {% if values.type == 'direction' %}selected{% endif %}>Direction</option>
            <option value="equipe"     {% if values.type == 'equipe' or not values.type %}selected{% endif %}>Équipe</option>
            <option value="projet"     {% if values.type == 'projet' %}selected{% endif %}>Projet</option>
            <option value="communaute" {% if values.type == 'communaute' %}selected{% endif %}>Communauté</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Groupe parent <span class="text-muted fw-normal">(optionnel)</span></label>
          <select name="parent" class="form-select">
            <option value="">— Aucun —</option>
            {% for g in all_groups %}
            <option value="{{ g.pk }}" {% if values.parent|stringformat:"s" == g.pk|stringformat:"s" %}selected{% endif %}>
              {{ g.name }}
            </option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Responsable</label>
        <select name="responsible" class="form-select" required>
          <option value="">— Choisir un responsable —</option>
          {% for p in all_persons %}
          <option value="{{ p.pk }}" {% if values.responsible|stringformat:"s" == p.pk|stringformat:"s" %}selected{% endif %}>
            {{ p.user.get_full_name }} ({{ p.user.email }})
          </option>
          {% endfor %}
        </select>
        <div class="form-text">Le responsable sera automatiquement ajouté comme membre.</div>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-check-lg me-1"></i>{{ action }}
        </button>
        <a href="{% url 'groups:group_list' %}" class="btn btn-outline-secondary">
          <i class="bi bi-arrow-left me-1"></i>Annuler
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
