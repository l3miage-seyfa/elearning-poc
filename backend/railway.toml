[build]
builder = "nixpacks"

[deploy]
preDeployCommand = "python manage.py migrate --noinput && python manage.py ensure_superuser"
startCommand = "python manage.py collectstatic --noinput && exec gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --access-logfile - --error-logfile -"
healthcheckPath = "/"
