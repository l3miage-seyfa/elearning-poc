<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion — eLearning POC</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-card { background: white; border-radius: 10px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 2px 12px rgba(0,0,0,.12); }
        h1 { text-align: center; margin-bottom: 8px; color: #2c3e50; }
        .subtitle { text-align: center; color: #777; margin-bottom: 28px; font-size: 14px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; font-size: 14px; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 16px; font-size: 15px; }
        button { width: 100%; padding: 12px; background: #2c3e50; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        button:hover { background: #1a252f; }
        .alert { padding: 10px 14px; border-radius: 4px; margin-bottom: 16px; background: #fde; border: 1px solid #e74c3c; color: #c0392b; font-size: 14px; }
    </style>
</head>
<body>
<div class="login-card">
    <h1>📚 eLearning POC</h1>
    <p class="subtitle">Connectez-vous pour accéder à la plateforme</p>

    {% if messages %}
        {% for message in messages %}
        <div class="alert">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="votre@email.com" required autofocus>
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
        <button type="submit">Se connecter</button>
    </form>
</div>
</body>
</html>
